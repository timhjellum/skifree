<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon-16x16.png">
    <link rel="manifest" href="./site.webmanifest">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <title>FreeSki</title>
</head>

<body>
    <div id="gameContainer">
        <canvas id="ski"></canvas>
        <div id="hud">
            <div id="scoreDisplay">Score: 0</div>
            <div id="distDisplay">Distance: 0m</div>
        </div>
        <div id="lives"></div>
        <button id="speedBtn">⚡ Fast</button>
        <div id="overlay">
            <h2>⛷ SkiFree</h2>
            <div class="sub">Choose your character</div>
            <div class="char-grid" id="charGrid"></div>
            <p class="tip">Mouse or arrow keys · Dodge obstacles · Collect flags · Survive the yeti!</p>
            <button id="startBtn" onclick="startGame()">LETS GO!!!</button>
        </div>
    </div>

</body>

</html>
